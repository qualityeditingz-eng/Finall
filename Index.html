<body>

<div class="container">
  <div>
    <div class="title">Code Scanner</div>
    <div class="subtitle">Point camera at your code</div>
  </div>

  <div class="scanner-wrap" id="scannerWrap">
    <div class="scanner-box" id="scannerBox">
      <div class="camera-placeholder" id="placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <p>Camera inactive</p>
      </div>
      <video id="video" autoplay playsinline muted></video>
      <img id="snapshot" alt="captured"/>
      <div class="scan-line"></div>
      <div class="processing-overlay" id="processingOverlay">
        <div class="spinner"></div>
      </div>
    </div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>

  <div class="status" id="status">AWAITING ACTIVATION</div>

  <div class="btn-row">
    <button class="btn-start" id="btnStart" onclick="startScanner()">
      <span>▶ Start Scanning</span>
    </button>
    <button class="btn-capture" id="btnCapture" onclick="captureAndScan()">
      📷 Done
    </button>
    <button class="btn-retry" id="btnRetry" onclick="retryScanner()">
      ↺ Retry
    </button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-badge" id="modalBadge">CODE</div>
    <div class="modal-title" id="modalTitle">Instructions</div>
    <ul class="modal-instructions" id="modalInstructions"></ul>
    <button class="modal-close" onclick="closeModal()">✕ &nbsp; Dismiss</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
  const CODE_DB = {
    "JK56": {
      title: "Jumping Jacks Challenge",
      instructions: [
        "Do jumping jacks every single day.",
        "Complete at least 300 jumping jacks per day.",
        "No rest days — stay consistent!"
      ]
    },
    "XZ11": {
      title: "Push-Up Challenge",
      instructions: [
        "Complete 100 push-ups every day.",
        "Absolutely no skips allowed.",
        "Stay disciplined and track your streak!"
      ]
    }
  };

  let stream = null, scanning = false;

  const video              = document.getElementById('video');
  const snapshot           = document.getElementById('snapshot');
  const placeholder        = document.getElementById('placeholder');
  const scannerBox         = document.getElementById('scannerBox');
  const statusEl           = document.getElementById('status');
  const btnStart           = document.getElementById('btnStart');
  const btnCapture         = document.getElementById('btnCapture');
  const btnRetry           = document.getElementById('btnRetry');
  const processingOverlay  = document.getElementById('processingOverlay');

  async function startScanner() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      video.srcObject = stream;
      video.style.display = 'block';
      snapshot.style.display = 'none';
      placeholder.style.display = 'none';
      scannerBox.classList.add('scanning');
      scanning = true;

      btnStart.style.display = 'none';
      btnCapture.style.display = 'inline-block';
      btnRetry.style.display = 'none';

      statusEl.textContent = 'POINT AT CODE — THEN PRESS DONE';
      statusEl.className = 'status active';
    } catch (e) {
      statusEl.textContent = 'CAMERA ACCESS DENIED';
      statusEl.className = 'status error';
      alert('Camera permission is required. Please allow camera access and try again.');
    }
  }

  function captureAndScan() {
    if (!scanning) return;

    // Freeze — draw video frame to canvas, show as image
    const canvas = document.createElement('canvas');
    canvas.width  = video.videoWidth  || 640;
    canvas.height = video.videoHeight || 480;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    // Show frozen snapshot
    snapshot.src = canvas.toDataURL('image/png');
    snapshot.style.display = 'block';
    video.style.display = 'none';
    scannerBox.classList.remove('scanning');

    // Stop camera stream
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    scanning = false;

    btnCapture.style.display = 'none';
    processingOverlay.classList.add('show');
    statusEl.textContent = 'READING CODE…';
    statusEl.className = 'status processing';

    // Preprocess for better OCR
    const processed = document.createElement('canvas');
    processed.width  = canvas.width;
    processed.height = canvas.height;
    const pCtx = processed.getContext('2d');
    pCtx.filter = 'grayscale(1) contrast(2.5) brightness(1.2)';
    pCtx.drawImage(canvas, 0, 0);

    // Run OCR
    Tesseract.recognize(processed, 'eng', {
      tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789',
      psm: 11
    }).then(({ data: { text } }) => {
      processingOverlay.classList.remove('show');
      const cleaned = text.replace(/\s+/g, '').toUpperCase();
      console.log('OCR raw:', text, '| Cleaned:', cleaned);
      const found = matchCode(cleaned);
      if (found) {
        triggerDetection(found);
      } else {
        statusEl.textContent = 'NO CODE FOUND — TRY AGAIN';
        statusEl.className = 'status error';
        btnRetry.style.display = 'inline-block';
      }
    }).catch(() => {
      processingOverlay.classList.remove('show');
      statusEl.textContent = 'SCAN FAILED — TRY AGAIN';
      statusEl.className = 'status error';
      btnRetry.style.display = 'inline-block';
    });
  }

  // Fuzzy-ish match: exact first, then 1-char substitution tolerance
  function matchCode(text) {
    for (const code of Object.keys(CODE_DB)) {
      if (text.includes(code)) return code;
    }
    // Allow 1 character difference (handles OCR misreads like 0↔O, 1↔I, 5↔S)
    for (const code of Object.keys(CODE_DB)) {
      for (let i = 0; i <= text.length - code.length; i++) {
        const slice = text.substring(i, i + code.length);
        let diff = 0;
        for (let j = 0; j < code.length; j++) {
          if (slice[j] !== code[j]) diff++;
        }
        if (diff <= 1) return code;
      }
    }
    return null;
  }

  function retryScanner() {
    snapshot.style.display = 'none';
    placeholder.style.display = 'flex';
    btnRetry.style.display = 'none';
    btnStart.style.display = 'inline-block';
    statusEl.textContent = 'AWAITING ACTIVATION';
    statusEl.className = 'status';
  }

  function triggerDetection(code) {
    statusEl.textContent = 'CODE DETECTED: ' + code;
    statusEl.className = 'status detected';

    const ring = document.createElement('div');
    ring.className = 'pulse-ring';
    document.getElementById('scannerWrap').appendChild(ring);
    setTimeout(() => ring.remove(), 700);

    const entry = CODE_DB[code];
    document.getElementById('modalBadge').textContent = code;
    document.getElementById('modalTitle').textContent = entry.title;
    const ul = document.getElementById('modalInstructions');
    ul.innerHTML = '';
    entry.instructions.forEach(line => {
      const li = document.createElement('li');
      li.textContent = line;
      ul.appendChild(li);
    });
    document.getElementById('modalOverlay').classList.add('show');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
    // Reset to start state
    snapshot.style.display = 'none';
    placeholder.style.display = 'flex';
    btnRetry.style.display = 'none';
    btnStart.style.display = 'inline-block';
    statusEl.textContent = 'AWAITING ACTIVATION';
    statusEl.className = 'status';
  }

  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
</script>
</body>
</html>
